---
- name: Baseline KVM-Blacksmith Guest Configuration
  hosts: all
  gather_facts: yes
  become: yes

  tasks:
    - name: Ensure APT cache is updated (Debian/Ubuntu)
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Ensure baseline packages are installed
      package:
        name:
          - curl
          - git
          - htop
        state: present

    - name: Configure Message of the Day (MOTD)
      copy:
        content: |
          =======================================================
          Welcome to your new Guest VM!
          Provisioned by: KVM-Blacksmith & KVM-Forge
          Configured by:  Ansible Baseline Playbook
          =======================================================
        dest: /etc/motd
        owner: root
        group: root
        mode: '0644'
